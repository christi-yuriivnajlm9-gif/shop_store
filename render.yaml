databases:
  - name: shop-store-db
    plan: free

services:
  - type: web
    name: shop-store
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn shop_store.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: shop-store-db
          property: connectionString
